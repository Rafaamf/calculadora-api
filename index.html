<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculadora API</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:        #0d0f14;
      --surface:   #161920;
      --surface2:  #1e222d;
      --border:    #2a2f3d;
      --accent:    #00e5a0;
      --accent2:   #0099ff;
      --warn:      #ff4d6d;
      --text:      #e8ecf4;
      --muted:     #6b7592;
      --radius:    14px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      overflow-x: hidden;
    }

    /* ── background grid ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,229,160,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,160,.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── header ── */
    header {
      position: relative;
      z-index: 1;
      padding: 2rem 3rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(0,229,160,.04) 0%, transparent 100%);
    }

    .logo {
      width: 40px; height: 40px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem;
    }

    header h1 {
      font-family: 'Space Mono', monospace;
      font-size: 1.1rem;
      letter-spacing: .04em;
    }

    header h1 span { color: var(--accent); }

    .badge {
      margin-left: auto;
      padding: .25rem .75rem;
      border-radius: 100px;
      background: rgba(0,229,160,.1);
      border: 1px solid rgba(0,229,160,.25);
      color: var(--accent);
      font-size: .75rem;
      font-family: 'Space Mono', monospace;
    }

    /* ── main layout ── */
    main {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: 2rem;
      padding: 2rem 3rem;
      max-width: 1200px;
      margin: 0 auto;
      width: 100%;
    }

    /* ── card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.75rem;
    }

    .card-title {
      font-family: 'Space Mono', monospace;
      font-size: .8rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1.25rem;
      display: flex;
      align-items: center;
      gap: .5rem;
    }

    .card-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── form ── */
    .field { margin-bottom: 1.1rem; }

    label {
      display: block;
      font-size: .82rem;
      color: var(--muted);
      margin-bottom: .4rem;
      font-weight: 500;
    }

    input, select {
      width: 100%;
      padding: .7rem 1rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'Space Mono', monospace;
      font-size: .9rem;
      transition: border-color .2s;
      outline: none;
    }

    input:focus, select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0,229,160,.1);
    }

    select option { background: var(--surface2); }

    /* ── op chips ── */
    .ops-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: .6rem;
      margin-bottom: 1.25rem;
    }

    .op-chip {
      padding: .6rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      font-family: 'Space Mono', monospace;
      font-size: .78rem;
      cursor: pointer;
      text-align: center;
      transition: all .2s;
      user-select: none;
    }

    .op-chip:hover { border-color: var(--accent); color: var(--accent); }

    .op-chip.active {
      border-color: var(--accent);
      background: rgba(0,229,160,.1);
      color: var(--accent);
    }

    .op-chip .symbol {
      display: block;
      font-size: 1.3rem;
      margin-bottom: .2rem;
    }

    /* ── button ── */
    button.calc-btn {
      width: 100%;
      padding: .85rem;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 8px;
      color: #000;
      font-family: 'DM Sans', sans-serif;
      font-weight: 700;
      font-size: .95rem;
      cursor: pointer;
      transition: opacity .2s, transform .1s;
      margin-top: .5rem;
    }

    button.calc-btn:hover { opacity: .9; }
    button.calc-btn:active { transform: scale(.98); }
    button.calc-btn:disabled { opacity: .4; cursor: not-allowed; }

    /* ── result ── */
    .result-box {
      margin-top: 1.5rem;
      padding: 1.25rem;
      background: var(--surface2);
      border-radius: 10px;
      border: 1px solid var(--border);
      display: none;
    }

    .result-box.visible { display: block; }
    .result-box.error { border-color: var(--warn); }

    .result-label {
      font-size: .75rem;
      color: var(--muted);
      margin-bottom: .4rem;
      font-family: 'Space Mono', monospace;
    }

    .result-value {
      font-family: 'Space Mono', monospace;
      font-size: 2rem;
      font-weight: 700;
      color: var(--accent);
      word-break: break-all;
    }

    .result-box.error .result-value { color: var(--warn); font-size: 1rem; }

    .result-meta {
      margin-top: .75rem;
      font-size: .78rem;
      color: var(--muted);
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .result-meta span { display: flex; align-items: center; gap: .3rem; }

    /* ── history panel ── */
    .history-panel { display: flex; flex-direction: column; gap: 1rem; }

    .history-filter {
      display: flex; gap: .5rem;
    }

    .history-filter input { flex: 1; }

    .history-filter button {
      padding: .7rem 1rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--accent);
      cursor: pointer;
      font-family: 'Space Mono', monospace;
      font-size: .8rem;
      white-space: nowrap;
      transition: border-color .2s;
    }

    .history-filter button:hover { border-color: var(--accent); }

    .history-list {
      display: flex;
      flex-direction: column;
      gap: .5rem;
      max-height: 480px;
      overflow-y: auto;
      padding-right: .25rem;
    }

    .history-list::-webkit-scrollbar { width: 4px; }
    .history-list::-webkit-scrollbar-track { background: transparent; }
    .history-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .hist-item {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: .85rem 1rem;
      display: flex;
      align-items: center;
      gap: .75rem;
      animation: slideIn .25s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(12px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .hist-op {
      width: 36px; height: 36px;
      border-radius: 8px;
      background: rgba(0,229,160,.1);
      border: 1px solid rgba(0,229,160,.2);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Space Mono', monospace;
      color: var(--accent);
      font-size: .9rem;
      flex-shrink: 0;
    }

    .hist-info { flex: 1; min-width: 0; }

    .hist-expr {
      font-family: 'Space Mono', monospace;
      font-size: .8rem;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .hist-meta { font-size: .7rem; color: var(--muted); margin-top: .2rem; }

    .hist-result {
      font-family: 'Space Mono', monospace;
      font-size: .85rem;
      color: var(--accent);
      font-weight: 700;
      flex-shrink: 0;
    }

    .empty-state {
      text-align: center;
      color: var(--muted);
      font-size: .85rem;
      padding: 2rem 1rem;
    }

    /* ── footer ── */
    footer {
      position: relative; z-index: 1;
      border-top: 1px solid var(--border);
      padding: 1rem 3rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: .75rem;
      color: var(--muted);
    }

    footer a { color: var(--accent); text-decoration: none; }

    /* ── loader ── */
    .loader {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid rgba(0,0,0,.3);
      border-top-color: #000;
      border-radius: 50%;
      animation: spin .6s linear infinite;
      vertical-align: middle;
      margin-right: .4rem;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── responsive ── */
    @media (max-width: 820px) {
      main { grid-template-columns: 1fr; padding: 1.5rem; }
      header { padding: 1.25rem 1.5rem; }
      footer { padding: 1rem 1.5rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">🧮</div>
  <h1>Calculadora <span>API</span></h1>
  <span class="badge">v2.0.0</span>
</header>

<main>

  <!-- ── Calculadora ── -->
  <div>
    <div class="card">
      <div class="card-title">Operação</div>

      <div class="field">
        <label>Usuário</label>
        <input id="usuario" type="text" value="gabriel" placeholder="nome do usuário" />
      </div>

      <!-- chips de operação -->
      <div class="card-title" style="margin-top:.5rem;">Selecione a operação</div>
      <div class="ops-grid">
        <div class="op-chip active" data-op="somar"        data-symbol="+" data-unary="false"><span class="symbol">+</span>Soma</div>
        <div class="op-chip"       data-op="subtrair"     data-symbol="−" data-unary="false"><span class="symbol">−</span>Subtração</div>
        <div class="op-chip"       data-op="multiplicar"  data-symbol="×" data-unary="false"><span class="symbol">×</span>Multiplicação</div>
        <div class="op-chip"       data-op="dividir"      data-symbol="÷" data-unary="false"><span class="symbol">÷</span>Divisão</div>
        <div class="op-chip"       data-op="potencia"     data-symbol="^" data-unary="false"><span class="symbol">xⁿ</span>Potência</div>
        <div class="op-chip"       data-op="raiz"         data-symbol="√" data-unary="true" ><span class="symbol">√</span>Raiz</div>
      </div>

      <div class="field">
        <label>Número 1</label>
        <input id="num1" type="number" step="any" value="10" />
      </div>

      <div class="field" id="num2-field">
        <label>Número 2</label>
        <input id="num2" type="number" step="any" value="5" />
      </div>

      <button class="calc-btn" id="calcBtn" onclick="calcular()">Calcular</button>

      <!-- resultado -->
      <div class="result-box" id="resultBox">
        <div class="result-label" id="resultLabel">RESULTADO</div>
        <div class="result-value" id="resultValue">—</div>
        <div class="result-meta" id="resultMeta"></div>
      </div>
    </div>
  </div>

  <!-- ── Histórico ── -->
  <div class="history-panel">
    <div class="card" style="flex:1">
      <div class="card-title">Histórico</div>

      <div class="history-filter">
        <input id="histUser" type="text" placeholder="filtrar por usuário…" value="gabriel" />
        <button onclick="carregarHistorico()">Buscar</button>
      </div>

      <div style="margin:.75rem 0; display:flex; gap:.5rem;">
        <button onclick="carregarTodos()" style="
          flex:1; padding:.5rem; background:var(--surface2); border:1px solid var(--border);
          border-radius:8px; color:var(--muted); cursor:pointer; font-size:.75rem;
          font-family:'Space Mono',monospace; transition:border-color .2s;"
          onmouseover="this.style.borderColor='var(--accent)'"
          onmouseout="this.style.borderColor='var(--border)'">
          Ver todos
        </button>
      </div>

      <div class="history-list" id="historyList">
        <div class="empty-state">Busque um usuário para ver o histórico.</div>
      </div>
    </div>
  </div>

</main>

<footer>
  <span>Sistemas Distribuídos — UNILAGO · Prof. Gleydes Oliveira</span>
  <span>Gabriel Alvarenga &amp; Rafael Fernandes</span>
</footer>

<script>
  const BASE = 'http://localhost:8000';
  let opAtual = 'somar';
  let isUnary = false;

  const SYMBOL = { somar:'+', subtrair:'−', multiplicar:'×', dividir:'÷', potencia:'^', raiz:'√' };
  const OP_LABEL = { soma:'Soma', subtracao:'Subtração', multiplicacao:'Multiplicação', divisao:'Divisão', potencia:'Potência', raiz_quadrada:'Raiz Quad.' };

  // ── chips ──────────────────────────────────
  document.querySelectorAll('.op-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      document.querySelectorAll('.op-chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      opAtual  = chip.dataset.op;
      isUnary  = chip.dataset.unary === 'true';
      document.getElementById('num2-field').style.display = isUnary ? 'none' : '';
      document.getElementById('resultBox').className = 'result-box';
    });
  });

  // ── calcular ───────────────────────────────
  async function calcular() {
    const btn    = document.getElementById('calcBtn');
    const box    = document.getElementById('resultBox');
    const val    = document.getElementById('resultValue');
    const meta   = document.getElementById('resultMeta');
    const label  = document.getElementById('resultLabel');
    const num1   = parseFloat(document.getElementById('num1').value);
    const num2   = parseFloat(document.getElementById('num2').value);
    const usuario = document.getElementById('usuario').value.trim() || 'anonimo';

    btn.disabled = true;
    btn.innerHTML = '<span class="loader"></span> Calculando…';

    const body = isUnary
      ? { numero1: num1, usuario }
      : { numero1: num1, numero2: num2, usuario };

    try {
      const res  = await fetch(`${BASE}/${opAtual}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      const data = await res.json();

      if (!res.ok) {
        box.className  = 'result-box visible error';
        label.textContent = 'ERRO';
        val.textContent   = data.detail || 'Erro desconhecido';
        meta.innerHTML    = '';
        return;
      }

      box.className = 'result-box visible';
      label.textContent = 'RESULTADO';
      val.textContent   = formatNum(data.resultado);

      const expr = isUnary
        ? `${SYMBOL[opAtual]}(${num1})`
        : `${num1} ${SYMBOL[opAtual]} ${num2}`;

      meta.innerHTML = `
        <span>🧮 ${expr} = ${formatNum(data.resultado)}</span>
        <span>👤 ${data.usuario}</span>
        <span>🕐 ${data.data_hora}</span>`;

      // atualiza histórico automaticamente
      document.getElementById('histUser').value = usuario;
      carregarHistorico();

    } catch (e) {
      box.className = 'result-box visible error';
      label.textContent = 'ERRO';
      val.textContent   = 'Não foi possível conectar à API. Verifique se o servidor está rodando.';
      meta.innerHTML    = '';
    } finally {
      btn.disabled = false;
      btn.textContent = 'Calcular';
    }
  }

  // ── histórico ──────────────────────────────
  async function carregarHistorico() {
    const usuario = document.getElementById('histUser').value.trim();
    if (!usuario) { carregarTodos(); return; }
    try {
      const res  = await fetch(`${BASE}/historico/${encodeURIComponent(usuario)}`);
      const data = await res.json();
      if (!res.ok) { renderHistorico([]); return; }
      renderHistorico(data.historico);
    } catch { renderHistorico(null); }
  }

  async function carregarTodos() {
    try {
      const res  = await fetch(`${BASE}/historico`);
      const data = await res.json();
      renderHistorico(data.historico);
    } catch { renderHistorico(null); }
  }

  function renderHistorico(items) {
    const list = document.getElementById('historyList');
    if (!items) {
      list.innerHTML = '<div class="empty-state">Erro ao conectar à API.</div>';
      return;
    }
    if (items.length === 0) {
      list.innerHTML = '<div class="empty-state">Nenhum registro encontrado.</div>';
      return;
    }
    list.innerHTML = items.map(item => {
      const sym  = SYMBOL[item.operacao] ?? '?';
      const expr = item.numero2 != null
        ? `${item.numero1} ${sym} ${item.numero2}`
        : `${sym}(${item.numero1})`;
      return `
        <div class="hist-item">
          <div class="hist-op">${sym}</div>
          <div class="hist-info">
            <div class="hist-expr">${expr}</div>
            <div class="hist-meta">👤 ${item.usuario} · ${item.data_hora}</div>
          </div>
          <div class="hist-result">= ${formatNum(item.resultado)}</div>
        </div>`;
    }).join('');
  }

  function formatNum(n) {
    if (Number.isInteger(n)) return n.toString();
    const s = parseFloat(n.toFixed(8)).toString();
    return s;
  }

  // carrega histórico inicial
  carregarHistorico();
</script>
</body>
</html>
